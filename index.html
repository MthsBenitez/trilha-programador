                description: 'Lidar com frustração (bugs infinitos) e Síndrome do Impostor.',

                subItems: [ { id: 'p2_1', label: 'Tolerância a Bugs Críticos' }, { id: 'p2_2', label: 'Desvincular o Ego do Código' } ]
            },
            {
                id: 'pd_3', title: '3. Comunicação Clara', estimatedHours: 15, dependsOn: ['pd_1'],
                description: 'Escuta ativa e como interagir no Slack/Teams sem causar ruídos.',

                projectTasks: [],
                subItems: [ { id: 'p3_1', label: 'Sintetização de Ideias' }, { id: 'p3_2', label: 'Pedir Ajuda com Contexto' } ]
            },
            {
                id: 'pd_4', title: '4. Marca Pessoal', estimatedHours: 20, dependsOn: ['pd_2', 'pd_3'],
                description: 'Posicionamento no LinkedIn, GitHub Readme e Portfólio.',
                masterAdvice: 'Recrutador não roda seu código, ele olha seu Readme. Documente seus projetos como se fossem produtos reais.',
                projectTasks: [],
                subItems: [ { id: 'p4_1', label: 'LinkedIn Otimizado (SEO)' }, { id: 'p4_2', label: 'Readmes Profissionais no GitHub' } ]

            {
                id: 'pd_5', title: '5. Entrevistas Técnicas', estimatedHours: 20, dependsOn: ['pd_4'],
                description: 'Estratégias para Whiteboard, Live Coding e como "vender" sua lógica.',
                masterAdvice: 'Em Live Coding, o avaliador quer ver COMO você pensa, não só se compila. Pense em voz alta o tempo todo.',
                projectTasks: [],
                subItems: [ { id: 'p5_1', label: 'Narrativa de Resolução de Problemas' }, { id: 'p5_2', label: 'STAR Method para Comportamental' } ]
            }
        ];

        const personalTreeTiers = [
            ['pd_1'],
            ['pd_2', 'pd_3'],
            ['pd_4'],
            ['pd_5']
        ];


        const allAchievements = [
            { id: 'start', t: 'O Despertar', d: 'Iniciou sua jornada no sistema.' },
            { id: 'mod_1', t: 'Primeira Vitória', d: 'Validou seu primeiro módulo de forma completa.' },
            { id: 'perc_50', t: 'Meio Caminho', d: 'Concluiu 50% de uma Trilha.' },
            { id: 'perc_100', t: 'Domínio Total', d: 'Gabaritou 100% de uma Trilha.' },
            { id: 'link_1', t: 'Curioso', d: 'Adicionou seu primeiro link customizado na trilha.' },
            { id: 'time_lord', t: 'Senhor do Tempo', d: 'Ajustou a carga horária real de um módulo.' },
            { id: 'night_owl', t: 'Coruja', d: 'Validou um módulo durante a madrugada (00:00 - 04:00).' },
            { id: 'su_fan', t: 'Crystal Gem', d: 'Completou a 1ª Temporada de S.U. inteira na técnica 3x!' }
        ];

        // --- FIREBASE URL ---
        const RAW_FIREBASE_URL = "https://trilha-frontend-2688f-default-rtdb.firebaseio.com/";
        const FIREBASE_URL = RAW_FIREBASE_URL.replace(/:null\/?$/, '').replace(/\/?$/, '') + "/trilha_data.json";

        function App() {
            const defaultState = {
                progress: {}, 
                customLinks: {}, 
                customHours: {}, 
                moduleTime: {}, 
                dailyHours: 2,
                achievements: ['start'],
                extraCourses: [] 
            };

            const [state, setState] = useState(() => {
                try {
                    const saved = localStorage.getItem('FE_Definitive_V4.0');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // Clean legacy states if they exist
                        delete parsed.studyLogs;
                        delete parsed.targetDate;
                        return { ...defaultState, ...parsed }; 
                    }
                } catch(e) {}
                return defaultState;
            });

            const isReadyForSync = useRef(false);

            useEffect(() => {
                fetch(FIREBASE_URL)
                    .then(res => res.json())
                    .then(data => {
                        if (data && typeof data === 'object' && !data.error) {
                            setState(prev => {
                                const safeData = { ...data };
                                if (safeData.achievements && !Array.isArray(safeData.achievements)) safeData.achievements = Object.values(safeData.achievements);
                                safeData.moduleTime = safeData.moduleTime || {};
                                safeData.progress = safeData.progress || {};
                                safeData.extraCourses = safeData.extraCourses || []; 
                                if (!Array.isArray(safeData.extraCourses)) safeData.extraCourses = Object.values(safeData.extraCourses);
                                // Clean legacy
                                delete safeData.studyLogs;
                                delete safeData.targetDate;
                                return { ...prev, ...safeData };
                            });
                        }
                        setTimeout(() => { isReadyForSync.current = true; }, 500);
                    }).catch(err => { isReadyForSync.current = true; });
            }, []);

            const triggerAchievement = (id) => {
                setState(p => {
                    const currentAch = Array.isArray(p.achievements) ? p.achievements : Object.values(p.achievements || {});
                    if (currentAch.includes(id)) return p; 
                    return { ...p, achievements: [...currentAch, id] };
                });
            };

            const checkGlobalAchievements = () => {
                const p = state.progress || {};
                const passedDev = detailedRoadmapData.filter(m => p[m.id]?.passed).length;
                const passedEn = detailedEnglishData.filter(m => p[m.id]?.passed).length;
                const passedTyp = detailedTypingData.filter(m => p[m.id]?.passed).length;
                const passedPd = detailedPersonalData.filter(m => p[m.id]?.passed).length;
                
                if (passedDev >= 1 || passedEn >= 1 || passedTyp >= 1 || passedPd >= 1) triggerAchievement('mod_1');
                
                if ((passedDev / detailedRoadmapData.length) >= 0.5 || 
                    (passedEn / detailedEnglishData.length) >= 0.5 ||
                    (passedTyp / detailedTypingData.length) >= 0.5 ||
                    (passedPd / detailedPersonalData.length) >= 0.5) triggerAchievement('perc_50');

                if (passedDev === detailedRoadmapData.length || 
                    passedEn === detailedEnglishData.length ||
                    passedTyp === detailedTypingData.length ||
                    passedPd === detailedPersonalData.length) triggerAchievement('perc_100');

                if (p['su_1']?.passed) triggerAchievement('su_fan');
            };

            useEffect(() => {
                localStorage.setItem('FE_Definitive_V4.0', JSON.stringify(state));
                checkGlobalAchievements();

                if (isReadyForSync.current) {
                    const syncTimeout = setTimeout(() => {
                        fetch(FIREBASE_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
                    }, 1000); 
                    return () => clearTimeout(syncTimeout);
                }
            }, [state]);

            const [activeTab, setActiveTab] = useState('trilha');
            const [selectedModule, setSelectedModule] = useState(null); 
            const [linkInputText, setLinkInputText] = useState('');
            const [extraCourseInput, setExtraCourseInput] = useState(''); 
            const [celebration, setCelebration] = useState(null); 
            const [svgLines, setSvgLines] = useState([]);
            const treeContainerRef = useRef(null);

            // --- LÓGICA DE DADOS DINÂMICOS DA TRILHA ---
            const isTrailTab = ['trilha', 'ingles', 'digitacao', 'desenvolvimento'].includes(activeTab);
            
            let currentData = detailedRoadmapData;
            let currentTiers = skillTreeTiers;
            let tabNameDisplay = 'Dev';
            let themeColor = 'indigo';
            let gradientContainer = "from-indigo-500 via-purple-500 to-cyan-400 shadow-[0_10px_30px_-10px_rgba(79,70,229,0.3)] hover:shadow-[0_10px_40px_-5px_rgba(79,70,229,0.5)]";
            let gradientText = "from-indigo-300 via-purple-300 to-cyan-300";

            if (activeTab === 'ingles') {
                currentData = detailedEnglishData;
                currentTiers = englishTreeTiers;
                tabNameDisplay = 'Inglês';
                themeColor = 'rose';
                gradientContainer = "from-rose-500 via-pink-500 to-amber-400 shadow-[0_10px_30px_-10px_rgba(244,63,94,0.3)] hover:shadow-[0_10px_40px_-5px_rgba(244,63,94,0.5)]";
                gradientText = "from-rose-300 via-pink-300 to-amber-300";
            } else if (activeTab === 'digitacao') {
                currentData = detailedTypingData;
                currentTiers = typingTreeTiers;
                tabNameDisplay = 'Digitação';
                themeColor = 'sky';
                gradientContainer = "from-sky-500 via-blue-500 to-indigo-400 shadow-[0_10px_30px_-10px_rgba(14,165,233,0.3)] hover:shadow-[0_10px_40px_-5px_rgba(14,165,233,0.5)]";
                gradientText = "from-sky-300 via-blue-300 to-indigo-300";
            } else if (activeTab === 'desenvolvimento') {
                currentData = detailedPersonalData;
                currentTiers = personalTreeTiers;
                tabNameDisplay = 'Soft Skills';
                themeColor = 'amber';
                gradientContainer = "from-amber-500 via-orange-500 to-rose-400 shadow-[0_10px_30px_-10px_rgba(245,158,11,0.3)] hover:shadow-[0_10px_40px_-5px_rgba(245,158,11,0.5)]";
                gradientText = "from-amber-300 via-orange-300 to-rose-300";
            }

            const [timer, setTimer] = useState({ active: false, moduleId: null, seconds: 0 });

            useEffect(() => {
                let interval;
                if (timer.active) {
                    interval = setInterval(() => setTimer(prev => ({ ...prev, seconds: prev.seconds + 1 })), 1000);
                }
                return () => clearInterval(interval);
            }, [timer.active]);

            const startTimer = (moduleId) => {
                if (timer.moduleId !== moduleId) setTimer({ active: true, moduleId, seconds: 0 });
                else setTimer(prev => ({ ...prev, active: true }));
            };
            const pauseTimer = () => setTimer(prev => ({ ...prev, active: false }));
            const saveTimer = () => {
                if (!timer.moduleId || timer.seconds === 0) return;
                setState(prev => ({
                    ...prev,
                    moduleTime: { ...(prev.moduleTime || {}), [timer.moduleId]: ((prev.moduleTime || {})[timer.moduleId] || 0) + timer.seconds }
                }));
                setTimer({ active: false, moduleId: null, seconds: 0 });
            };

            const formatChrono = (ts) => {
                const h = Math.floor(ts / 3600); const m = Math.floor((ts % 3600) / 60); const s = ts % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };
            const formatTimeDisplay = (ts) => {
                if (!ts) return "0m";
                const h = Math.floor(ts / 3600); const m = Math.floor((ts % 3600) / 60);
                return h > 0 ? `${h}h ${m}m` : `${m}m`;
            };

            const handleAddExtraCourse = () => {
                if(!extraCourseInput.trim()) return;
                setState(p => ({ ...p, extraCourses: [...(p.extraCourses || []), { id: Date.now().toString(), name: extraCourseInput.trim(), done: false }] }));
                setExtraCourseInput('');
            };
            const toggleExtraCourse = (id) => setState(p => ({ ...p, extraCourses: (p.extraCourses || []).map(c => c.id === id ? { ...c, done: !c.done } : c) }));
            const deleteExtraCourse = (id) => setState(p => ({ ...p, extraCourses: (p.extraCourses || []).filter(c => c.id !== id) }));

            const isModuleLocked = useCallback((moduleId) => {
                const mod = currentData.find(m => m.id === moduleId);
                if (!mod || !mod.dependsOn) return false;
                return mod.dependsOn.some(depId => !(state.progress || {})[depId]?.passed);
            }, [state.progress, currentData]);

            const toggleObjective = (moduleId, objectiveId) => {
                setState(prev => {
                    const modProgress = (prev.progress || {})[moduleId] || {};
                    const objs = modProgress.objectives || [];
                    const nObjs = objs.includes(objectiveId) ? objs.filter(id => id !== objectiveId) : [...objs, objectiveId];
                    return { ...prev, progress: { ...prev.progress, [moduleId]: { ...modProgress, objectives: nObjs } } };
                });
            };

            const calculateLines = useCallback(() => {
                if (!treeContainerRef.current || !isTrailTab) return;
                const containerRect = treeContainerRef.current.getBoundingClientRect();
                const newLines = [];

                currentData.forEach(module => {
                    if (!module.dependsOn || module.dependsOn.length === 0) return;
                    const targetEl = document.getElementById(`node-${module.id}`);
                    if (!targetEl) return;
                    const targetRect = targetEl.getBoundingClientRect();

                    module.dependsOn.forEach(depId => {
                        const sourceEl = document.getElementById(`node-${depId}`);
                        if (!sourceEl) return;
                        const sourceRect = sourceEl.getBoundingClientRect();

                        const startX = (sourceRect.left - containerRect.left) + (sourceRect.width / 2);
                        const startY = (sourceRect.bottom - containerRect.top);
                        const endX = (targetRect.left - containerRect.left) + (targetRect.width / 2);
                        const endY = (targetRect.top - containerRect.top);

                        const isSourcePassed = (state.progress || {})[depId]?.passed;
                        const isTargetPassed = (state.progress || {})[module.id]?.passed;
                        
                        let lineStatus = 'locked'; 
                        if (isSourcePassed && isTargetPassed) lineStatus = 'passed'; 
                        else if (isSourcePassed) lineStatus = 'active'; 

                        newLines.push({ id: `${depId}-${module.id}`, x1: startX, y1: startY, x2: endX, y2: endY, status: lineStatus });
                    });
                });
                setSvgLines(newLines);
            }, [activeTab, state.progress, currentData, isTrailTab]);

            useLayoutEffect(() => {
                const timerDelay = setTimeout(calculateLines, 100);
                window.addEventListener('resize', calculateLines);
                return () => { clearTimeout(timerDelay); window.removeEventListener('resize', calculateLines); };
            }, [calculateLines, activeTab]);

            const calendarData = useMemo(() => {
                let d = new Date(); d.setHours(0,0,0,0);
                return currentData.map(mod => {
                    const h = (state.customHours || {})[mod.id] || mod.estimatedHours;
                    const passed = (state.progress || {})[mod.id]?.passed;
                    if (passed) return { ...mod, actualHours: h, isPassed: true, compDate: new Date((state.progress || {})[mod.id].completionDate) };
                    const days = Math.ceil(h / state.dailyHours) || 1;
                    const sDate = new Date(d); d.setDate(d.getDate() + days);
                    const eDate = new Date(d); eDate.setDate(eDate.getDate() - 1); 
                    return { ...mod, actualHours: h, daysNeeded: days, startDate: sDate, endDate: eDate < sDate ? sDate : eDate, isPassed: false };
                });
            }, [state.customHours, state.dailyHours, state.progress, currentData]);

            const futureModules = calendarData.filter(c => !c.isPassed);
            const graduationDate = futureModules.length > 0 ? futureModules[futureModules.length-1].endDate : new Date();
            const totalRemainingDays = futureModules.reduce((acc, curr) => acc + curr.daysNeeded, 0);
            const formatDate = (d) => d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
            
            const triggerVictory = (mod) => {
                setState(p => ({
                    ...p, progress: { ...(p.progress || {}), [mod.id]: { ...((p.progress||{})[mod.id]||{}), passed: true, cert: null, completionDate: new Date().toISOString() } }
                }));
                const hour = new Date().getHours();
                if (hour >= 0 && hour <= 4) triggerAchievement('night_owl');

                setSelectedModule(null);
                setCelebration(mod); 
            };

            if (celebration) {
                return (
                    <div className="fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-xl flex flex-col items-center justify-center p-4 overflow-hidden">

                        <div className="relative z-10 text-center max-w-2xl w-full">
                            <div className="w-32 h-32 bg-emerald-950/50 backdrop-blur-md border-2 border-emerald-400/50 rounded-full flex items-center justify-center mx-auto mb-8 level-up-glow shadow-[0_0_50px_rgba(16,185,129,0.3)]">
                                <i className="fa-solid fa-shield-check text-6xl text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.8)]"></i>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-teal-300 to-cyan-400 mb-2 uppercase tracking-tighter animate-fade-in drop-shadow-lg">
                                Level Up
                            </h1>
                            <p className="text-emerald-400 font-bold tracking-widest uppercase mb-10 text-sm opacity-80">Módulo Validado: {celebration.title}</p>
                            
                            <div className="glass-panel rounded-3xl p-6 text-left max-h-64 overflow-y-auto mb-8 relative">
                                <p className="text-xs text-slate-400 uppercase font-black mb-4 border-b border-white/5 pb-3">Habilidades Desbloqueadas & Auto-Check</p>
                                <div className="space-y-3">
                                    {celebration.subItems.map((si, idx) => (
                                        <div key={idx} className="item-unlock text-sm font-bold text-slate-200 flex items-center gap-4 bg-white/5 p-3.5 rounded-xl border border-white/5 shadow-sm" style={{animationDelay: `${idx * 0.15}s`}}>
                                            <div className="w-7 h-7 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center shrink-0 shadow-lg shadow-emerald-500/30">
                                                <i className="fa-solid fa-check text-slate-950 text-xs"></i>
                                            </div>
                                            {si.label}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button onClick={() => setCelebration(null)} className="w-full py-5 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white rounded-2xl font-black uppercase tracking-widest shadow-[0_10px_30px_rgba(16,185,129,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 animate-fade-in border border-emerald-400/30" style={{animationDelay: '1.5s'}}>
                                Coletar Conhecimento e Continuar
                            </button>
                        </div>
                    </div>
                );
            }

            const safeAchievements = Array.isArray(state.achievements) ? state.achievements : Object.values(state.achievements || {});

            return (
                <div className="min-h-screen bg-[#020617] pb-24 relative selection:bg-indigo-500/30 overflow-x-hidden">
                    
                    {/* MENU DE NAVEGAÇÃO PRINCIPAL */}
                    <nav className="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-2xl border-b border-white/5 px-4 py-4 overflow-x-auto shadow-2xl hide-scroll">
                        <div className="max-w-7xl mx-auto flex gap-2 justify-start md:justify-center min-w-max">
                            {[
                                { id: 'trilha', icon: 'fa-code', name: 'Trilha DEV' },
                                { id: 'ingles', icon: 'fa-language', name: 'Trilha Inglês' }, 
                                { id: 'digitacao', icon: 'fa-keyboard', name: 'Trilha Digitação' }, 
                                { id: 'desenvolvimento', icon: 'fa-user-ninja', name: 'Soft Skills' }, 
                                { id: 'extras', icon: 'fa-book-bookmark', name: 'Cursos Extras' }, 
                                { id: 'ferramentas', icon: 'fa-toolbox', name: 'Arsenal' },
                                { id: 'dicas', icon: 'fa-brain', name: 'Cérebro' },
                                { id: 'cursos', icon: 'fa-globe', name: 'Cursos' },
                                { id: 'trofeus', icon: 'fa-medal', name: 'Troféus' },
                                { id: 'motivacao', icon: 'fa-rocket', name: 'Futuro' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedModule(null); }} 
                                    className={`px-5 py-2.5 rounded-[1.25rem] font-bold text-sm transition-all duration-500 flex items-center gap-2.5 border whitespace-nowrap
                                    ${activeTab === tab.id ? 'bg-indigo-600 border-indigo-500 text-white shadow-[0_5px_20px_-5px_rgba(79,70,229,0.5)]' : 'bg-transparent border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200 hover:border-white/10'}`}>
                                    <i className={`fa-solid ${tab.icon} ${activeTab === tab.id ? 'opacity-100' : 'opacity-50'}`}></i> {tab.name}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto mt-12 px-4 relative">
                        
                        {/* --- MAPAS DE HABILIDADES --- */}
                        {isTrailTab && (
                            <div className="animate-fade-in pb-20 relative">
                                
                                <div className="mb-16 glass-panel rounded-[2.5rem] p-6 md:p-10 shadow-2xl relative overflow-hidden group transition-colors duration-700 hover:border-white/10">
                                    <div className={`absolute top-0 right-0 w-64 h-64 blur-[80px] rounded-full pointer-events-none transition-colors duration-700 bg-${themeColor}-500/10 group-hover:bg-${themeColor}-500/20`}></div>
                                    
                                    <div className="flex flex-col lg:flex-row justify-between items-center gap-8 relative z-10">
                                        <div className="flex-1 w-full lg:max-w-sm flex items-center justify-between gap-4 bg-black/40 border border-white/5 p-5 rounded-[2rem] shadow-inner transition-colors group-hover:border-white/10">
                                            <div className="text-left ml-2">
                                                <p className={`font-black uppercase tracking-widest text-[10px] text-${themeColor}-400`}>Ritmo</p>
                                                <p className="text-slate-300 font-bold text-sm">Horas/Dia</p>
                                            </div>
                                            <div className="flex items-center gap-2 bg-black/50 p-1.5 rounded-2xl border border-white/5">
                                                <button onClick={() => setState(p => ({...p, dailyHours: Math.max(1, p.dailyHours-1)}))} className="w-10 h-10 bg-white/5 hover:bg-white/10 rounded-xl font-black text-white transition-all hover:scale-105 active:scale-95 border border-white/5">-</button>
                                                <span className="text-xl font-black w-10 text-center text-white">{state.dailyHours}</span>
                                                <button onClick={() => setState(p => ({...p, dailyHours: p.dailyHours+1}))} className="w-10 h-10 bg-white/5 hover:bg-white/10 rounded-xl font-black text-white transition-all hover:scale-105 active:scale-95 border border-white/5">+</button>
                                            </div>
                                        </div>

                                        <div className="flex-1 w-full text-center">
                                            <p className="text-slate-500 font-black uppercase tracking-widest text-[10px] mb-3">Previsão de Formatura ({tabNameDisplay})</p>
                                            {futureModules.length > 0 ? (
                                                <div className={`inline-block bg-gradient-to-r p-[1px] rounded-[2.5rem] transition-shadow duration-500 cursor-default ${gradientContainer}`}>
                                                    <div className="bg-slate-950 px-10 py-4 rounded-[2.5rem]">
                                                        <span className={`text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r tracking-tighter ${gradientText}`}>{formatDate(graduationDate)}</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="inline-block bg-gradient-to-r from-emerald-500 to-teal-400 p-[1px] rounded-[2.5rem] shadow-[0_10px_30px_-10px_rgba(16,185,129,0.3)] cursor-default">
                                                    <div className="bg-slate-950 px-10 py-4 rounded-[2.5rem]">
                                                        <span className="text-3xl font-black text-emerald-400 uppercase tracking-widest drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]">Jornada Concluída</span>
                                                    </div>
                                                </div>
                                            )}

                                <div className="glass-panel p-6 md:p-10 rounded-[2.5rem] relative overflow-hidden">

                                        </button>
                                    </div>

                                    <div className="space-y-4 relative z-10">

                                            </div>
                                        ) : (

                                                    <label className="flex items-center gap-5 cursor-pointer flex-1 mr-4">

                                                            ${course.done ? 'text-emerald-400 line-through opacity-70' : 'text-slate-200'}`}>

                                                        </span>
                                                        <input type="checkbox" checked={course.done} onChange={() => toggleExtraCourse(course.id)} className="hidden" />
                                                    </label>

                                                    <button onClick={() => deleteExtraCourse(course.id)} className="w-10 h-10 rounded-xl bg-white/5 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 flex items-center justify-center transition-colors shrink-0">
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>

                                            <div>
                                                <h3 className="text-2xl font-black text-white mb-3 group-hover:text-amber-400 transition-colors">{t.title}</h3>

                                        return (

                                                {unl && <div className="absolute -right-10 -top-10 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl group-hover:bg-amber-500/20 transition-colors duration-500"></div>}

                                                    <i className={`fa-solid ${unl ? 'fa-medal' : 'fa-lock'}`}></i>

                                                <h3 className={`text-lg font-black mb-3 relative z-10 ${unl ? 'text-white' : 'text-slate-500'}`}>{a.t}</h3>
                                                <p className="text-xs text-slate-400 leading-relaxed relative z-10 mb-6 flex-1">{a.d}</p>
                                                
                                                {unl && (
                                                    <div className="mt-auto w-full text-[10px] font-black text-amber-300 uppercase tracking-widest bg-amber-500/10 border border-amber-500/20 py-2.5 rounded-xl shadow-inner">
                                                        Desbloqueado
                                                    </div>

                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'motivacao' && (

                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[300px] bg-fuchsia-500/10 blur-[100px] rounded-full pointer-events-none"></div>

                                        Combustível de Foguete

                                    <p className="text-slate-300 text-lg md:text-xl max-w-3xl mx-auto leading-relaxed relative z-10">

                                    </p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8 relative z-10">

                                        <div className="absolute -left-20 -top-20 w-64 h-64 bg-emerald-500/10 blur-[80px] rounded-full pointer-events-none group-hover:bg-emerald-500/20 transition-colors duration-700"></div>
                                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-5 mb-10 relative z-10">
                                            <div className="w-20 h-20 bg-emerald-500/10 rounded-[1.5rem] flex items-center justify-center border border-emerald-500/20 text-4xl text-emerald-400 shadow-inner group-hover:scale-110 transition-transform duration-500">
                                                <i className="fa-solid fa-sack-dollar drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]"></i>
                                            </div>
                                            <h3 className="text-3xl font-black text-white tracking-tight">O Mapa da Riqueza</h3>
                                        </div>
                                        <div className="space-y-4 relative z-10">
                                            <div className="bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/30 flex flex-col sm:flex-row justify-between sm:items-center gap-3 shadow-[0_0_20px_rgba(16,185,129,0.1)] relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                                                <div className="ml-2">
                                                    <p className="font-black text-emerald-300">Pleno (O seu alvo)</p>
                                                    <p className="text-[11px] text-emerald-400/60 uppercase tracking-widest mt-1">Autonomia e arquitetura.</p>
                                                </div>
                                                <span className="text-2xl font-black text-emerald-400 drop-shadow-md">R$ 7k - 12k</span>
                                            </div>
                                            <div className="bg-gradient-to-r from-amber-500/10 to-black/20 p-5 rounded-2xl border border-amber-500/30 flex flex-col sm:flex-row justify-between sm:items-center gap-3 mt-6 shadow-inner">
                                                <div>
                                                    <p className="font-black text-amber-400 flex items-center gap-2"><i className="fa-solid fa-earth-americas"></i> Carreira Gringa (Remoto)</p>
                                                    <p className="text-[11px] text-amber-400/60 uppercase tracking-widest mt-1">Dólar / Euro direto no Brasil.</p>
                                                </div>
                                                <span className="text-2xl font-black text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.5)]">U$ 3k - 8k+</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="glass-panel border-t border-l border-white/10 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden bg-gradient-to-br from-slate-900/80 to-[#020617]">
                                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-cyan-500/5 blur-[120px] rounded-full pointer-events-none"></div>
                                        <div className="text-center mb-8 relative z-10">
                                            <h3 className="text-3xl font-black text-white mb-4 tracking-tighter">O Escudo de Titânio <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">(Anti-IA)</span></h3>
                                            <p className="text-slate-400 text-sm max-w-3xl mx-auto">Por que o ChatGPT não vai roubar a sua cadeira.</p>
                                        </div>
                                        
                                        <div className="flex flex-col gap-4 relative z-10">
                                            <div className="bg-black/40 p-5 rounded-2xl border border-rose-500/20 flex gap-4">
                                                <div className="w-10 h-10 shrink-0 bg-rose-500/10 rounded-xl flex items-center justify-center border border-rose-500/30">
                                                    <i className="fa-solid fa-brain text-rose-400"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-white text-sm">Engenharia, não Digitação</h4>
                                                    <p className="text-xs text-slate-400 mt-1">A IA gera o código, mas não decide onde ele deve morar ou qual padrão usar.</p>
                                                </div>
                                            </div>
                                            <div className="bg-black/40 p-5 rounded-2xl border border-cyan-500/20 flex gap-4">
                                                <div className="w-10 h-10 shrink-0 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/30">
                                                    <i className="fa-solid fa-shield-halved text-cyan-400"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-white text-sm">O Orquestrador</h4>
                                                    <p className="text-xs text-slate-400 mt-1">Você será o desenvolvedor que julga e orquestra a IA com segurança e autonomia.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
