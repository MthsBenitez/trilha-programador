        // --- URL DO FIREBASE FORNECIDA PELO USUÁRIO ---
        const FIREBASE_URL = "https://trilha-frontend-2688f-default-rtdb.firebaseio.com/trilha_data.json";

        function App() {
            const defaultState = {
                progress: {}, 
                customLinks: {}, 
                customHours: {}, 
                dailyHours: 2,
                achievements: ['start'],
                studyLogs: {}, 
                targetDate: '', 
                customExams: {}
            };

            // LocalStorage (Estado Inicial Rápido)
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('FE_Definitive_V3.3');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaultState, ...parsed }; 
                }
                return defaultState;
            });

            // Ref para controlar sincronização e evitar loops
            const isReadyForSync = useRef(false);

            // 1. FETCH INICIAL (NUVEM -> LOCAL)
            useEffect(() => {
                fetch(FIREBASE_URL)
                    .then(res => res.json())
                    .then(data => {
                        if (data) {
                            // Se a nuvem tem dados, mescla/sobrescreve os locais
                            setState(prev => ({ ...prev, ...data }));
                        }
                        // Libera permissão de salvar na nuvem 500ms depois (evita que o load vazio limpe a nuvem)
                        setTimeout(() => { isReadyForSync.current = true; }, 500);
                    })
                    .catch(err => {
                        console.error("Erro ao puxar dados do Firebase:", err);
                        isReadyForSync.current = true; // Libera save local mesmo se offline
                    });
            }, []);

            // 2. SAVE CONTÍNUO (LOCAL -> NUVEM)
            useEffect(() => {
                // Sempre salva localmente
                localStorage.setItem('FE_Definitive_V3.3', JSON.stringify(state));
                checkGlobalAchievements();

                // Se passou do load inicial, envia para o Firebase com Debounce (1 segundo)
                if (isReadyForSync.current) {
                    const syncTimeout = setTimeout(() => {
                        fetch(FIREBASE_URL, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(state)
                        }).catch(err => console.error("Erro ao sincronizar com Firebase:", err));
                    }, 1000); // 1s de delay para não sobrecarregar API ao digitar notas

                    return () => clearTimeout(syncTimeout);
                }
            }, [state]);

            const [activeTab, setActiveTab] = useState('trilha');
            const [selectedModule, setSelectedModule] = useState(null); 
            
            const [isExamFormOpen, setIsExamFormOpen] = useState(false);
            const [aiToken, setAiToken] = useState('');
            const [linkInputText, setLinkInputText] = useState('');
            const [formError, setFormError] = useState('');

            const [examMode, setExamMode] = useState(null); 
            const [examAnswers, setExamAnswers] = useState({});
            const [examDamage, setExamDamage] = useState(false); 
            const [examFailedMsg, setExamFailedMsg] = useState(null);

            const [celebration, setCelebration] = useState(null); 

            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [selectedLogDate, setSelectedLogDate] = useState(null);
            const [logForm, setLogForm] = useState({ hours: '', notes: '' });

            const [svgLines, setSvgLines] = useState([]);
            const treeContainerRef = useRef(null);

            const isModuleLocked = useCallback((moduleId) => {
                const mod = detailedRoadmapData.find(m => m.id === moduleId);
                if (!mod || !mod.dependsOn) return false;
                return mod.dependsOn.some(depId => !state.progress[depId]?.passed);
            }, [state.progress]);

            const calculateLines = useCallback(() => {
                if (!treeContainerRef.current || activeTab !== 'trilha') return;
                
                const containerRect = treeContainerRef.current.getBoundingClientRect();
                const newLines = [];

                detailedRoadmapData.forEach(module => {
                    if (!module.dependsOn || module.dependsOn.length === 0) return;
                    
                    const targetEl = document.getElementById(`node-${module.id}`);
                    if (!targetEl) return;
                    
                    const targetRect = targetEl.getBoundingClientRect();

                    module.dependsOn.forEach(depId => {
                        const sourceEl = document.getElementById(`node-${depId}`);
                        if (!sourceEl) return;

                        const sourceRect = sourceEl.getBoundingClientRect();

                        const startX = (sourceRect.left - containerRect.left) + (sourceRect.width / 2);
                        const startY = (sourceRect.bottom - containerRect.top);
                        const endX = (targetRect.left - containerRect.left) + (targetRect.width / 2);
                        const endY = (targetRect.top - containerRect.top);

                        const isSourcePassed = state.progress[depId]?.passed;
                        const isTargetPassed = state.progress[module.id]?.passed;
                        
                        let lineStatus = 'locked'; 
                        if (isSourcePassed && isTargetPassed) lineStatus = 'passed'; 
                        else if (isSourcePassed) lineStatus = 'active'; 

                        newLines.push({ id: `${depId}-${module.id}`, x1: startX, y1: startY, x2: endX, y2: endY, status: lineStatus });
                    });
                });
                
                setSvgLines(newLines);
            }, [activeTab, state.progress]);

            useLayoutEffect(() => {
                const timer = setTimeout(calculateLines, 100);
                window.addEventListener('resize', calculateLines);
                return () => { clearTimeout(timer); window.removeEventListener('resize', calculateLines); };
            }, [calculateLines, activeTab]);

            const calendarData = useMemo(() => {
                let currentDate = new Date();
                currentDate.setHours(0,0,0,0);
                
                return detailedRoadmapData.map(mod => {
                    const moduleHours = state.customHours[mod.id] || mod.estimatedHours;
                    const isPassed = state.progress[mod.id]?.passed;
                    
                    if (isPassed) {
                        return { ...mod, actualHours: moduleHours, isPassed, compDate: new Date(state.progress[mod.id].completionDate) };
                    }

                    const daysNeeded = Math.ceil(moduleHours / state.dailyHours) || 1;
                    const startDate = new Date(currentDate);
                    currentDate.setDate(currentDate.getDate() + daysNeeded);
                    const endDate = new Date(currentDate);
                    endDate.setDate(endDate.getDate() - 1); 

                    return { ...mod, actualHours: moduleHours, daysNeeded, startDate, endDate: endDate < startDate ? startDate : endDate, isPassed: false };
                });
            }, [state.customHours, state.dailyHours, state.progress]);

            const futureModules = calendarData.filter(c => !c.isPassed);
            const graduationDate = futureModules.length > 0 ? futureModules[futureModules.length-1].endDate : new Date();
            const totalRemainingDays = futureModules.reduce((acc, curr) => acc + curr.daysNeeded, 0);

            const formatDate = (date) => date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
            
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const totalHoursStudied = useMemo(() => {
                return Object.values(state.studyLogs).reduce((acc, log) => acc + (Number(log.hours) || 0), 0);
            }, [state.studyLogs]);

            const chartData = useMemo(() => {
                const data = [];
                let maxH = 0;
                for(let i=6; i>=0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dStr = d.toISOString().split('T')[0];
                    const h = state.studyLogs[dStr]?.hours || 0;
                    if(h > maxH) maxH = h;
                    data.push({ date: `${d.getDate()}/${d.getMonth()+1}`, hours: h });
                }
                return { data, maxH: maxH < 5 ? 5 : maxH }; 
            }, [state.studyLogs]);

            const triggerAchievement = (id) => {
                if (!state.achievements.includes(id)) {
                    setState(p => ({ ...p, achievements: [...p.achievements, id] }));
                }
            };

            const checkGlobalAchievements = () => {
                const passedCount = Object.keys(state.progress).filter(k => state.progress[k].passed).length;
                const perc = (passedCount / detailedRoadmapData.length) * 100;
                
                if (passedCount >= 1) triggerAchievement('mod_1');
                if (perc >= 25) triggerAchievement('perc_25');
                if (perc >= 50) triggerAchievement('perc_50');
                if (perc >= 75) triggerAchievement('perc_75');
                if (perc === 100) triggerAchievement('perc_100');

                if (state.progress['security']?.passed) triggerAchievement('security_exp');
                if (state.progress['frameworks']?.passed) triggerAchievement('framework_king');
                if (state.progress['ts']?.passed) triggerAchievement('ts_master');

                const linksCount = Object.values(state.customLinks).flat().length;
                if (linksCount >= 1) triggerAchievement('link_1');
                if (linksCount >= 10) triggerAchievement('link_10');

                const certCount = Object.keys(state.progress).filter(k => state.progress[k].cert).length;
                if (certCount >= 5) triggerAchievement('cert_5');
            };

            const openExamForm = () => {
                setAiToken('');
                setFormError('');
                setIsExamFormOpen(true);
            };

            const handleSaveCustomExam = (moduleId) => {
                if (!aiToken.trim()) {
                    setFormError('Cole o código gerado pela IA primeiro.'); return;
                }

                try {
                    let decodedStr = '';
                    try {
                        decodedStr = decodeURIComponent(escape(window.atob(aiToken.trim())));
                    } catch(e) {
                        decodedStr = window.atob(aiToken.trim());
                    }
                    
                    const parsed = JSON.parse(decodedStr);
                    
                    if (!parsed.q || !parsed.options || parsed.options.length !== 4 || typeof parsed.a !== 'number') {
                        throw new Error("Formato inválido");
                    }

                    setState(prev => ({
                        ...prev,
                        customExams: { ...prev.customExams, [moduleId]: parsed }
                    }));
                    setIsExamFormOpen(false);
                } catch (err) {
                    setFormError('Código inválido. Copie exatamente a string Base64 que a IA gerou (sem formatação markdown).');
                }
            };

            const handleDeleteCustomExam = (moduleId) => {
                setState(prev => {
                    const newExams = { ...prev.customExams };
                    delete newExams[moduleId];
                    return { ...prev, customExams: newExams };
                });
            };

            const startExam = (mod) => {
                const customExam = state.customExams[mod.id];
                if(!customExam) return;

                setExamMode({ 
                    ...mod, 
                    shuffledQuiz: [{
                        q: customExam.q,
                        options: customExam.options,
                        a: customExam.a,
                        topicRef: "Avaliação Customizada"
                    }] 
                });
                setExamAnswers({});
                setExamDamage(false);
                setExamFailedMsg(null);
                setSelectedModule(null); 
            };

            const handleAnswer = (qIndex, oIndex, correctIndex) => {
                if (examAnswers[qIndex] !== undefined || examFailedMsg) return;

                if (oIndex !== correctIndex) {
                    setExamDamage(true);
                    setExamFailedMsg("SISTEMA COMPROMETIDO: Bloqueio de 24 Horas ativado.");
                    
                    const lockTime = new Date().getTime() + (24 * 60 * 60 * 1000);
                    setState(prev => ({
                        ...prev,
                        progress: { ...prev.progress, [examMode.id]: { ...(prev.progress[examMode.id] || {}), lockedUntil: lockTime } }
                    }));

                    setTimeout(() => {
                        setExamMode(null);
                        setExamDamage(false);
                        setExamFailedMsg(null);
                        setSelectedModule(examMode.id); 
                    }, 4500);
                } else {
                    const newAnswers = { ...examAnswers, [qIndex]: oIndex };
                    setExamAnswers(newAnswers);
                    if (Object.keys(newAnswers).length === examMode.shuffledQuiz.length) {
                        triggerVictory(examMode);
                    }
                }
            };

            const triggerVictory = (mod) => {
                setState(p => ({
                    ...p, progress: { ...p.progress, [mod.id]: { passed: true, cert: null, completionDate: new Date().toISOString() } }
                }));
                const hour = new Date().getHours();
                if (hour >= 0 && hour <= 4) triggerAchievement('night_owl');

                setExamMode(null);
                setCelebration(mod); 
            };

            const handleSaveLog = () => {
                if(!selectedLogDate) return;
                setState(p => ({
                    ...p, 
                    studyLogs: { 
                        ...p.studyLogs, 
                        [selectedLogDate]: { hours: Number(logForm.hours)||0, notes: logForm.notes } 
                    }
                }));
                setSelectedLogDate(null);
            };

            const openLogModal = (year, month, day) => {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                setSelectedLogDate(dateStr);
                const existing = state.studyLogs[dateStr] || { hours: '', notes: '' };
                setLogForm({ hours: existing.hours || '', notes: existing.notes || '' });
            };

            if (celebration) {
                return (
                    <div className="fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-xl flex flex-col items-center justify-center p-4 overflow-hidden">
                        <div className="absolute inset-0 opacity-30 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-emerald-500/20 via-transparent to-transparent pointer-events-none"></div>
                        <div className="relative z-10 text-center max-w-2xl w-full">
                            <div className="w-32 h-32 bg-emerald-950/50 backdrop-blur-md border-2 border-emerald-400/50 rounded-full flex items-center justify-center mx-auto mb-8 level-up-glow shadow-[0_0_50px_rgba(16,185,129,0.3)]">
                                <i className="fa-solid fa-shield-check text-6xl text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.8)]"></i>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-teal-300 to-cyan-400 mb-2 uppercase tracking-tighter animate-fade-in drop-shadow-lg">
                                Level Up
                            </h1>
                            <p className="text-emerald-400 font-bold tracking-widest uppercase mb-10 text-sm opacity-80">Módulo Validado: {celebration.title}</p>
                            
                            <div className="glass-panel rounded-3xl p-6 text-left max-h-64 overflow-y-auto mb-8 relative">
                                <p className="text-xs text-slate-400 uppercase font-black mb-4 border-b border-white/5 pb-3">Habilidades Desbloqueadas & Auto-Check</p>
                                <div className="space-y-3">
                                    {celebration.subItems.map((si, idx) => (
                                        <div key={idx} className="item-unlock text-sm font-bold text-slate-200 flex items-center gap-4 bg-white/5 p-3.5 rounded-xl border border-white/5 shadow-sm" style={{animationDelay: `${idx * 0.15}s`}}>
                                            <div className="w-7 h-7 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center shrink-0 shadow-lg shadow-emerald-500/30">
                                                <i className="fa-solid fa-check text-slate-950 text-xs"></i>
                                            </div>
                                            {si.label}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button onClick={() => setCelebration(null)} className="w-full py-5 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white rounded-2xl font-black uppercase tracking-widest shadow-[0_10px_30px_rgba(16,185,129,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 animate-fade-in border border-emerald-400/30" style={{animationDelay: '1.5s'}}>
                                Coletar Conhecimento e Continuar
                            </button>
                        </div>
                    </div>
                );
            }

            if (examMode) {
                return (
                    <div className={`min-h-screen exam-mode text-slate-300 p-4 md:p-10 font-sans transition-colors duration-300 ${examDamage ? 'damage-flash' : ''}`}>
                        <div className="max-w-4xl mx-auto glass-panel rounded-[2.5rem] p-6 md:p-12 relative animate-fade-in border border-indigo-500/10">
                            <div className="flex justify-between items-start mb-10 pb-8 border-b border-white/5">
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-purple-400 uppercase tracking-tighter mb-2">Avaliação Definitiva</h1>
                                    <p className="text-slate-400 text-sm flex items-center gap-2"><i className="fa-solid fa-user-shield"></i> {examMode.title} (Desafio IA)</p>
                                </div>
                                <button onClick={() => { setExamMode(null); setSelectedModule(examMode.id); }} className="text-slate-400 hover:text-white text-xl bg-white/5 hover:bg-white/10 w-12 h-12 rounded-full flex items-center justify-center border border-white/10 transition-all shadow-lg"><i className="fa-solid fa-times"></i></button>
                            </div>

                            <div className="bg-rose-950/20 backdrop-blur-md border border-rose-500/20 p-5 rounded-2xl mb-10 flex items-start gap-5 shadow-lg shadow-rose-900/10">
                                <div className="w-12 h-12 rounded-full bg-rose-500/10 flex items-center justify-center shrink-0 border border-rose-500/20">
                                    <i className="fa-solid fa-skull text-rose-400 text-xl animate-pulse"></i>
                                </div>
                                <div>
                                    <h4 className="text-rose-300 font-black uppercase tracking-wider text-sm mb-1.5">Regra de 1 Erro (Morte Súbita)</h4>
                                    <p className="text-rose-200/60 text-xs leading-relaxed">Este é um desafio encriptado. Se errar, demonstra lacuna crítica e o sistema bloqueará a realização de exames neste módulo por 24 horas. Concentre-se.</p>
                                </div>
                            </div>

                            {examFailedMsg && (
                                <div className="absolute inset-0 z-20 bg-rose-950/95 backdrop-blur-xl flex flex-col items-center justify-center rounded-[2.5rem] border border-rose-500/30 p-6 text-center animate-fade-in shadow-2xl">
                                    <i className="fa-solid fa-triangle-exclamation text-8xl text-rose-500 mb-8 drop-shadow-[0_0_30px_rgba(225,29,72,0.6)]"></i>
                                    <h2 className="text-3xl md:text-4xl font-black text-white uppercase tracking-widest mb-3">{examFailedMsg}</h2>
                                    <p className="text-rose-200/80 max-w-md mx-auto">Você errou uma premissa do desafio ofuscado. A avaliação foi encerrada e o módulo ficará bloqueado. Retornando ao mapa em instantes...</p>
                                </div>
                            )}

                            <div className="space-y-12">
                                {examMode.shuffledQuiz.map((q, idx) => {
                                    const isAnswered = examAnswers[idx] !== undefined;
                                    const answerState = isAnswered ? (examAnswers[idx] === q.a ? 'correct' : 'wrong') : 'pending';

                                    return (
                                        <div key={idx} className={`relative transition-all duration-500 ${answerState === 'correct' ? 'opacity-40 grayscale blur-[1px]' : ''}`}>
                                            <div className="mb-4 inline-flex bg-indigo-500/10 border border-indigo-500/20 px-4 py-1.5 rounded-full text-[10px] font-black text-indigo-300 uppercase tracking-widest shadow-inner">
                                                Alvo: {q.topicRef}
                                            </div>
                                            <div className="bg-slate-900/50 p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-xl">
                                                <p className="text-lg md:text-xl font-bold text-white mb-8 leading-relaxed">
                                                    <span className="text-indigo-400 mr-3 opacity-50">{idx+1}.</span> {q.q}
                                                </p>
                                                <div className="space-y-3">
                                                    {q.options.map((opt, optIdx) => {
                                                        let btnClass = "bg-black/20 border-white/5 text-slate-300 hover:border-indigo-400/50 hover:bg-indigo-500/5 hover:text-white shadow-sm";
                                                        if (isAnswered) {
                                                            if (optIdx === q.a) btnClass = "bg-emerald-500/10 border-emerald-400 text-emerald-300 shadow-[0_0_15px_rgba(52,211,153,0.1)]"; 
                                                            else if (examAnswers[idx] === optIdx) btnClass = "bg-rose-500/10 border-rose-500 text-rose-300 shadow-[0_0_15px_rgba(244,63,94,0.1)]"; 
                                                            else btnClass = "bg-black/10 border-transparent text-slate-600 opacity-30"; 
                                                        }
                                                        return (
                                                            <button key={optIdx} onClick={() => handleAnswer(idx, optIdx, q.a)} disabled={isAnswered || examFailedMsg}
                                                                className={`w-full text-left p-4 md:p-5 rounded-2xl border transition-all duration-300 text-sm md:text-base font-medium ${btnClass}`}>
                                                                {opt}
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#020617] pb-24 relative selection:bg-indigo-500/30 overflow-x-hidden">
                    
                    {/* MENU DE NAVEGAÇÃO PRINCIPAL */}
                    <nav className="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-2xl border-b border-white/5 px-4 py-4 overflow-x-auto shadow-2xl hide-scroll">
                        <div className="max-w-7xl mx-auto flex gap-2 justify-start md:justify-center min-w-max">
                            {[
                                { id: 'trilha', icon: 'fa-network-wired', name: 'Mapa' },
                                { id: 'diario', icon: 'fa-calendar-check', name: 'Diário' },
                                { id: 'ferramentas', icon: 'fa-toolbox', name: 'Arsenal' },
                                { id: 'dicas', icon: 'fa-brain', name: 'Cérebro' },
                                { id: 'cursos', icon: 'fa-globe', name: 'Cursos' },
                                { id: 'trofeus', icon: 'fa-medal', name: 'Troféus' },
                                { id: 'motivacao', icon: 'fa-rocket', name: 'Futuro' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`px-5 py-2.5 rounded-[1.25rem] font-bold text-sm transition-all duration-500 flex items-center gap-2.5 border
                                    ${activeTab === tab.id ? 'bg-indigo-600 border-indigo-500 text-white shadow-[0_5px_20px_-5px_rgba(79,70,229,0.5)]' : 'bg-transparent border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200 hover:border-white/10'}`}>
                                    <i className={`fa-solid ${tab.icon} ${activeTab === tab.id ? 'opacity-100' : 'opacity-50'}`}></i> {tab.name}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto mt-12 px-4 relative">
                        
                        {/* MAPA DE HABILIDADES */}
                        {activeTab === 'trilha' && (
                            <div className="animate-fade-in pb-20 relative">
                                
                                <div className="mb-16 glass-panel rounded-[2.5rem] p-6 md:p-10 shadow-2xl relative overflow-hidden group hover:border-indigo-500/20 transition-colors duration-700">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/10 blur-[80px] rounded-full pointer-events-none group-hover:bg-indigo-500/20 transition-colors duration-700"></div>
                                    
                                    <div className="flex flex-col lg:flex-row justify-between items-center gap-8 relative z-10">
                                        
                                        <div className="flex-1 w-full lg:max-w-sm flex items-center justify-between gap-4 bg-black/40 border border-white/5 p-5 rounded-[2rem] shadow-inner transition-colors group-hover:border-white/10">
                                            <div className="text-left ml-2">
                                                <p className="text-indigo-400 font-black uppercase tracking-widest text-[10px]">Ritmo</p>
                                                <p className="text-slate-300 font-bold text-sm">Horas/Dia</p>
                                            </div>
                                            <div className="flex items-center gap-2 bg-black/50 p-1.5 rounded-2xl border border-white/5">
