                                                <p className="text-xs text-slate-400 leading-relaxed relative z-10 mb-6 flex-1">{a.d}</p>

                                                        Desbloqueado

                                            </div>

                                </div>

                                                <div>
                                                    <p className="font-black text-amber-400 flex items-center gap-2"><i className="fa-solid fa-earth-americas"></i> Carreira Gringa (Remoto)</p>

                                                </div>
                                                <span className="text-2xl font-black text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.5)]">U$ 3k - 8k+</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="glass-panel border-t border-l border-white/10 rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden bg-gradient-to-br from-slate-900/80 to-[#020617]">

                                        <div className="text-center mb-8 relative z-10">
                                            <h3 className="text-3xl font-black text-white mb-4 tracking-tighter">O Escudo de Titânio <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">(Anti-IA)</span></h3>
                                            <p className="text-slate-400 text-sm max-w-3xl mx-auto">Por que o ChatGPT não vai roubar a sua cadeira.</p>
                                        </div>
                                        
                                        <div className="flex flex-col gap-4 relative z-10">
                                            <div className="bg-black/40 p-5 rounded-2xl border border-rose-500/20 flex gap-4">
                                                <div className="w-10 h-10 shrink-0 bg-rose-500/10 rounded-xl flex items-center justify-center border border-rose-500/30">
                                                    <i className="fa-solid fa-brain text-rose-400"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-white text-sm">Engenharia, não Digitação</h4>
                                                    <p className="text-xs text-slate-400 mt-1">A IA gera o código, mas não decide onde ele deve morar ou qual padrão usar.</p>
                                                </div>
                                            </div>
                                            <div className="bg-black/40 p-5 rounded-2xl border border-cyan-500/20 flex gap-4">
                                                <div className="w-10 h-10 shrink-0 bg-cyan-500/10 rounded-xl flex items-center justify-center border border-cyan-500/30">
                                                    <i className="fa-solid fa-shield-halved text-cyan-400"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-white text-sm">O Orquestrador</h4>
                                                    <p className="text-xs text-slate-400 mt-1">Você será o desenvolvedor que julga e orquestra a IA com segurança e autonomia.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
